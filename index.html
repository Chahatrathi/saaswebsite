<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITE | Official Store India</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        :root { --bg: #000; --accent: #fff; --green: #00ff88; --red: #ff4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Helvetica Neue', Arial; overflow-x: hidden; }

        nav { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; padding: 25px 40px; z-index: 1000; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
        .nav-links { display: flex; gap: 20px; font-size: 10px; letter-spacing: 2px; align-items: center; }
        .nav-links a { cursor: pointer; text-decoration: none; text-transform: uppercase; color: #fff; opacity: 0.8; }
        
        .page { display: none; min-height: 100vh; padding: 120px 30px; position: relative; z-index: 10; }
        .page.active { display: block; }

        #hero-canvas { position: fixed; inset: 0; z-index: 1; filter: brightness(0.4); pointer-events: none; }
        
        .clothes-ticker { width: 100%; overflow: hidden; position: fixed; bottom: 0; z-index: 50; padding: 20px 0; background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.8) 100%); }
        .ticker-track { display: flex; animation: scroll 30s linear infinite; }
        .clothes-ticker img { width: 150px; height: 150px; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); margin-right: 50px; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        
        #cart-sidebar { position: fixed; right: -400px; top: 0; width: 350px; height: 100vh; background: #0a0a0a; border-left: 1px solid #222; z-index: 2000; padding: 40px 20px; transition: 0.5s; overflow-y: auto; }
        #cart-sidebar.open { right: 0; }
        
        .btn-prime { width: 100%; padding: 15px; background: #fff; color: #000; border: none; font-weight: 900; cursor: pointer; font-size: 10px; margin-top: 10px; }
        .btn-del { background: var(--red); color: #fff; font-size: 8px; padding: 5px; width: auto; margin-top: 5px; cursor: pointer; border: none; }

        input, select, textarea { width: 100%; padding: 15px; margin-bottom: 10px; background: rgba(255,255,255,0.05); border: 1px solid #333; color: #fff; outline: none; }
        .online { background: var(--green) !important; box-shadow: 0 0 10px var(--green); }
        #toast { position: fixed; bottom: 30px; right: 30px; background: #fff; color: #000; padding: 15px 30px; display: none; z-index: 9999; font-weight: bold; font-size: 10px; }
        
        .stat-card { background: #111; border: 1px solid var(--green); padding: 20px; margin-bottom: 20px; text-align: center; border-radius: 5px; }
        .query-item { background: #0a0a0a; border-bottom: 1px solid #222; padding: 10px; font-size: 11px; margin-bottom: 10px; text-align: left;}
        
        #size-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 6000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .size-content { background: #0a0a0a; border: 1px solid #222; padding: 40px; width: 100%; max-width: 500px; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 12px; }
        th, td { border: 1px solid #333; padding: 12px; text-align: center; }
        th { background: #111; color: var(--green); }

        .size-btn { background: #000; border: 1px solid #333; color: #fff; padding: 5px 10px; cursor: pointer; font-size: 10px; transition: 0.3s; }
        .size-btn.selected { border-color: var(--green); color: var(--green); }

        .cart-item-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #222; }
        .btn-remove { background: none; border: 1px solid var(--red); color: var(--red); font-size: 8px; padding: 2px 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="toast">MESSAGE</div>

    <div id="size-modal"><div class="size-content"><h2>SIZE GUIDE</h2><table><tr><th>SIZE</th><th>CHEST</th><th>LENGTH</th></tr><tr><td>S</td><td>42</td><td>27</td></tr><tr><td>M</td><td>44</td><td>28</td></tr><tr><td>L</td><td>46</td><td>29</td></tr><tr><td>XL</td><td>48</td><td>30</td></tr></table><button class="btn-prime" onclick="toggleSizeModal()">CLOSE</button></div></div>

    <div id="cart-sidebar">
        <h2 style="letter-spacing:5px; margin-bottom:30px;">CART</h2>
        <div id="cart-items"></div>
        
        <div style="margin-top:20px; border-top:1px solid #222; padding-top:20px;">
            <input type="text" id="promo-input" placeholder="PROMO CODE" style="font-size:10px; padding:10px;">
            <button class="btn-prime" style="margin-top:0; padding:10px; background:var(--green);" onclick="applyPromo()">APPLY</button>
        </div>

        <div id="cart-total" style="border-top:1px solid #222; padding-top:20px; font-weight:bold; margin-top: 20px;">TOTAL: ₹0</div>
        <button class="btn-prime" onclick="checkoutCart()">CHECKOUT VIA STRIPE</button>
        <button onclick="toggleCart()" style="background:none; border:none; color:#555; margin-top:20px; cursor:pointer; width:100%;">CLOSE</button>
    </div>

    <nav>
        <div class="logo" onclick="showPage('home-page')">ELITE</div>
        <div class="nav-links">
            <a onclick="showPage('home-page')">Home</a>
            <a onclick="showPage('store-page'); loadProducts();">Store</a>
            <a id="cart-link" onclick="toggleCart()">Cart (<span id="cart-count">0</span>)</a>
            <a id="contact-link" onclick="showPage('contact-page')">Contact</a>
            <a id="admin-link" onclick="showPage('admin-page'); loadAdminData();" style="display:none; color:var(--green);">Admin</a>
            <a id="auth-trigger" onclick="openAuth('LOGIN')">Account<span id="status-dot" class="status-dot"></span></a>
            <a id="logout-link" onclick="logout()" style="display:none; color:var(--red);">Logout</a>
        </div>
    </nav>

    <canvas id="hero-canvas"></canvas>

    <div id="home-page" class="page active">
        <div style="height:70vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; z-index: 60;">
            <h1 style="font-size:15vw; font-weight:900; line-height:0.8;">ELITE</h1>
            <p style="letter-spacing:10px; margin-top:20px;">GYM-WEAR INDIA</p>
        </div>
        <div class="clothes-ticker"><div id="ticker-track" class="ticker-track"></div></div>
    </div>

    <div id="store-page" class="page">
        <div id="product-grid" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); gap:30px;"></div>
    </div>

    <div id="contact-page" class="page">
        <div style="max-width:500px; margin: 0 auto; background: #0a0a0a; padding: 40px; border: 1px solid #222;">
            <h2 style="text-align:center; margin-bottom:20px;">SUBMIT QUERY</h2>
            <input type="text" id="q-name" placeholder="YOUR NAME">
            <input type="email" id="q-email" placeholder="YOUR EMAIL">
            <textarea id="q-message" rows="5" placeholder="MESSAGE"></textarea>
            <button class="btn-prime" onclick="sendQuery()">SEND QUERY</button>
        </div>
    </div>

    <div id="admin-page" class="page">
        <div class="stat-card">
            <p style="font-size:10px; opacity:0.6;">TOTAL REVENUE</p>
            <h1 id="revenue-display" style="color:var(--green); font-size:40px;">₹0</h1>
        </div>
        <div style="max-width:1000px; margin: 0 auto; display:grid; grid-template-columns: 1fr 1fr; gap:50px;">
            <div>
                <h3>ADD PRODUCT</h3>
                <input type="text" id="p-name" placeholder="NAME">
                <input type="number" id="p-price" placeholder="PRICE">
                <input type="file" id="p-image" accept="image/*">
                <button class="btn-prime" onclick="uploadProduct()">UPLOAD</button>
            </div>
            <div>
                <h3>CUSTOMER QUERIES</h3>
                <div id="admin-queries-list"></div>
            </div>
        </div>
    </div>

    <div id="verify-page" class="page">
        <div style="max-width:400px; margin:0 auto; text-align:center; background:#0a0a0a; padding:40px; border:1px solid var(--green);">
            <h2 id="verify-msg">VERIFYING ACCOUNT...</h2>
            <button class="btn-prime" onclick="showPage('home-page')">GO HOME</button>
        </div>
    </div>

    <div id="auth-overlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.9); display:none; align-items:center; justify-content:center; z-index:5000;">
        <div style="background:#000; border:1px solid #333; padding:40px; width:350px; text-align:center;">
            <h2 id="auth-title">LOGIN</h2>
            <div id="auth-fields"></div>
            <button class="btn-prime" onclick="submitAuth()">CONTINUE</button>
            <p onclick="toggleAuth()" style="font-size:10px; margin-top:20px; cursor:pointer;">SIGNUP</p>
        </div>
    </div>

    <script>
        const API_BASE = "https://elite-backend-1c3m.onrender.com/api";
        const stripe = Stripe('pk_test_51TGFqzEvRNYv35zvMRUZZZ67MAw9wYzSSU7jcz8yRDSAhyXVYSr8lZ0sGXlJoMnj6PqrvBa3KiIvqHTIayDenHjd00ag4jevWd'); 
        let loggedUser = null;
        let cart = [];
        let allProducts = [];
        let discount = 0;

        // --- CART LOGIC ---
        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('open'); }

        function addToCart(id, name, price, image, btn) {
            const selectedSizeBtn = btn.parentElement.querySelector('.size-btn.selected');
            if(!selectedSizeBtn) return alert("PLEASE SELECT A SIZE FIRST!");
            const size = selectedSizeBtn.innerText;
            const tempId = Math.random().toString(36).substr(2, 9);
            cart.push({ id, tempId, name, price, image, size });
            updateCartUI();
            showToast("ADDED");
        }

        function removeFromCart(tid) {
            cart = cart.filter(i => i.tempId !== tid);
            updateCartUI();
            showToast("REMOVED");
        }

        function applyPromo() {
            const code = document.getElementById('promo-input').value.toUpperCase();
            if(code === "ELITE10") {
                discount = 0.10;
                showToast("10% DISCOUNT APPLIED");
            } else {
                discount = 0;
                alert("INVALID CODE");
            }
            updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById('cart-items');
            document.getElementById('cart-count').innerText = cart.length;
            let subtotal = cart.reduce((sum, item) => sum + item.price, 0);
            let finalTotal = subtotal * (1 - discount);
            
            list.innerHTML = cart.map(item => `
                <div class="cart-item-row">
                    <div style="font-size:10px;">
                        <b>${item.name}</b> (${item.size})<br>₹${item.price}
                    </div>
                    <button class="btn-remove" onclick="removeFromCart('${item.tempId}')">REMOVE</button>
                </div>
            `).join('');
            
            document.getElementById('cart-total').innerHTML = discount > 0 ? 
                `<span style="text-decoration:line-through; opacity:0.5; font-size:10px;">₹${subtotal}</span> ₹${finalTotal.toFixed(0)} (PROMO APPLIED)` : 
                `TOTAL: ₹${subtotal}`;
        }

        async function checkoutCart() {
            if (!loggedUser) return openAuth('LOGIN');
            const total = cart.reduce((sum, item) => sum + item.price, 0) * (1 - discount);
            const res = await fetch(`${API_BASE}/create-checkout-session`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userEmail: loggedUser.email, items: cart, finalAmount: total })
            });
            const session = await res.json();
            stripe.redirectToCheckout({ sessionId: session.id });
        }

        // --- AUTH & ADMIN (KEEP EXISTING) ---
        async function submitAuth() {
            const mode = document.getElementById('auth-title').innerText.toLowerCase();
            const res = await fetch(`${API_BASE}/${mode}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email: document.getElementById('a-email').value, password: document.getElementById('a-pass').value, fullName: document.getElementById('a-name')?.value })
            });
            const data = await res.json();
            if(res.ok) {
                if(mode === 'signup') alert(data.message);
                loggedUser = data.user;
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('auth-trigger').innerText = (loggedUser.name || "USER").toUpperCase();
                document.getElementById('logout-link').style.display = 'inline-block';
                const isAdmin = loggedUser.email === "chahat.rathi1@gmail.com";
                document.getElementById('admin-link').style.display = isAdmin ? 'inline-block' : 'none';
                document.getElementById('cart-link').style.display = isAdmin ? 'none' : 'inline-block';
                document.getElementById('contact-link').style.display = isAdmin ? 'none' : 'inline-block';
                loadProducts(); showToast("LOGGED IN");
            } else { alert(data.error); }
        }

        function logout() { loggedUser = null; location.reload(); }

        function selectSize(btn) {
            btn.parentElement.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        async function loadProducts() {
            const res = await fetch(`${API_BASE}/products`);
            allProducts = await res.json();
            document.getElementById('product-grid').innerHTML = allProducts.map(p => `
                <div style="background:#111; padding:20px; border:1px solid #222; text-align:center;">
                    <img src="${p.image}" style="width:100%; height:250px; object-fit:cover; margin-bottom:15px;" onerror="this.src='https://via.placeholder.com/250'">
                    <h3>${p.name.toUpperCase()}</h3><p style="color:var(--green)">₹${p.price}</p>
                    ${!(loggedUser && loggedUser.email === "chahat.rathi1@gmail.com") ? `
                        <div class="size-selector" style="margin:15px 0; display:flex; justify-content:center; gap:5px;">
                            ${['S','M','L','XL'].map(s => `<button class="size-btn" onclick="selectSize(this)">${s}</button>`).join('')}
                        </div>
                        <button class="btn-prime" onclick="addToCart('${p._id}', '${p.name}', ${p.price}, '${p.image}', this)">ADD TO CART</button>
                    ` : `<p style="font-size:10px; opacity:0.5;">ADMIN VIEW</p>`}
                </div>
            `).join('');
            const track = document.getElementById('ticker-track');
            if(track) track.innerHTML = [...allProducts, ...allProducts].map(p => `<img src="${p.image}">`).join('');
        }

        async function loadAdminData() {
            const res = await fetch(`${API_BASE}/admin/stats`);
            const data = await res.json();
            document.getElementById('revenue-display').innerText = `₹${data.totalRevenue}`;
            document.getElementById('admin-queries-list').innerHTML = data.queries?.length ? data.queries.map(q => `<div class="query-item"><b>${q.name}</b><br>${q.message}<br><button class="btn-del" onclick="deleteQuery('${q._id}')">DELETE</button></div>`).join('') : "<p>NO QUERIES</p>";
        }

        async function deleteQuery(id) { await fetch(`${API_BASE}/admin/queries/${id}`, { method: 'DELETE' }); loadAdminData(); }
        async function sendQuery() { await fetch(`${API_BASE}/contact`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ name: document.getElementById('q-name').value, email: document.getElementById('q-email').value, message: document.getElementById('q-message').value }) }); showToast("SENT"); }
        async function uploadProduct() { const f = new FormData(); f.append('name', document.getElementById('p-name').value); f.append('price', document.getElementById('p-price').value); f.append('image', document.getElementById('p-image').files[0]); await fetch(`${API_BASE}/admin/products`, { method: 'POST', body: f }); loadProducts(); }
        function openAuth(m) { document.getElementById('auth-overlay').style.display = 'flex'; document.getElementById('auth-title').innerText = m; document.getElementById('auth-fields').innerHTML = m === 'SIGNUP' ? `<input id="a-name" placeholder="NAME"><input id="a-email" placeholder="EMAIL"><input type="password" id="a-pass" placeholder="PASS">` : `<input id="a-email" placeholder="EMAIL"><input type="password" id="a-pass" placeholder="PASS">`; }
        function toggleAuth() { openAuth(document.getElementById('auth-title').innerText === 'LOGIN' ? 'SIGNUP' : 'LOGIN'); }
        function toggleSizeModal() { const m = document.getElementById('size-modal'); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }
        function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = "block"; setTimeout(() => t.style.display = "none", 3000); }

        loadProducts();
        
        const canvas = document.getElementById("hero-canvas");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const images = [];
        for(let i=1; i<=50; i++) { const img = new Image(); img.src = `frames/${i.toString().padStart(2, '0')}.jpg`; images.push(img); }
        let idx = 0;
        function anim() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            const currentImg = images[Math.floor(idx % 50)];
            if(currentImg?.complete) {
                const scale = Math.max(canvas.width / currentImg.width, canvas.height / currentImg.height);
                ctx.drawImage(currentImg, canvas.width/2 - (currentImg.width*scale)/2, canvas.height/2 - (currentImg.height*scale)/2, currentImg.width*scale, currentImg.height*scale);
            }
            idx += 0.15; requestAnimationFrame(anim);
        }
        images[0].onload = anim;
    </script>
</body>
</html>
