<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITE | Official Store</title>
    <style>
        :root { --bg: #000; --accent: #fff; --green: #00ff88; --red: #ff4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Helvetica Neue', Arial; overflow-x: hidden; }

        nav { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; padding: 25px 40px; z-index: 1000; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); }
        .logo { font-weight: 900; letter-spacing: 8px; cursor: pointer; }
        .nav-links { display: flex; gap: 20px; font-size: 10px; letter-spacing: 2px; align-items: center; }
        .nav-links a { cursor: pointer; color: #fff; text-decoration: none; text-transform: uppercase; opacity: 0.8; }
        
        .page { display: none; min-height: 100vh; padding: 120px 30px; position: relative; z-index: 10; }
        .page.active { display: block; }

        /* CANVAS BACKGROUND FOR GYM FRAMES */
        #hero-canvas { position: fixed; inset: 0; z-index: 1; filter: brightness(0.4); pointer-events: none; }

        .btn-prime { width: 100%; padding: 15px; background: #fff; color: #000; border: none; font-weight: 900; cursor: pointer; font-size: 10px; margin-top: 10px; }
        .btn-delete { background: var(--red); color: white; margin-top: 5px; }

        input, textarea { width: 100%; padding: 15px; margin-bottom: 10px; background: rgba(255,255,255,0.05); border: 1px solid #333; color: #fff; outline: none; }
        #toast { position: fixed; bottom: 30px; right: 30px; background: #fff; color: #000; padding: 15px 30px; display: none; z-index: 9999; font-weight: bold; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); display: inline-block; margin-left: 5px; }
        .online { background: var(--green) !important; box-shadow: 0 0 10px var(--green); }
    </style>
</head>
<body>

    <div id="toast">MESSAGE</div>

    <nav>
        <div class="logo" onclick="showPage('home-page')">ELITE</div>
        <div class="nav-links">
            <a onclick="showPage('home-page')">Home</a>
            <a onclick="showPage('store-page'); loadProducts();">Store</a>
            <a id="admin-link" onclick="showPage('admin-page'); loadAdminProducts();" style="display:none; color:var(--green);">Admin</a>
            <a id="auth-trigger" onclick="openAuth('LOGIN')">Account<span id="status-dot" class="status-dot"></span></a>
        </div>
    </nav>

    <canvas id="hero-canvas"></canvas>

    <div id="home-page" class="page active" style="z-index: 20;">
        <div style="height:70vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;">
            <h1 style="font-size:15vw; font-weight:900; line-height:0.8;">ELITE</h1>
            <p style="letter-spacing:10px; margin-top:20px;">GYM-WEAR INDIA</p>
        </div>
    </div>

    <div id="store-page" class="page">
        <h2 style="text-align:center; letter-spacing:5px;">LATEST DROPS</h2>
        <div id="product-grid" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(250px, 1fr)); gap:30px; margin-top:50px;"></div>
    </div>

    <div id="admin-page" class="page">
        <div style="max-width:800px; margin:0 auto;">
            <div style="background:#111; padding:40px; border:1px solid #333; margin-bottom:40px;">
                <h3>ADD NEW PRODUCT</h3>
                <input type="text" id="p-name" placeholder="PRODUCT NAME">
                <input type="number" id="p-price" placeholder="PRICE (₹)">
                <button class="btn-prime" onclick="addProduct()">PUBLISH</button>
            </div>
            <h3>INVENTORY</h3>
            <div id="admin-product-list" style="margin-top:20px;"></div>
        </div>
    </div>

    <div id="auth-overlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.9); display:none; align-items:center; justify-content:center; z-index:5000;">
        <div style="background:#000; border:1px solid #333; padding:40px; width:350px; text-align:center;">
            <h2 id="auth-title">LOGIN</h2><br>
            <div id="auth-fields"></div>
            <button class="btn-prime" onclick="submitAuth()">CONTINUE</button>
            <p onclick="toggleAuth()" style="font-size:10px; margin-top:20px; cursor:pointer; opacity:0.5;">OR SIGNUP</p>
        </div>
    </div>

    <script>
        const API_BASE = "http://localhost:5000/api";
        let loggedUser = null;

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            // Dim frames on other pages
            document.getElementById('hero-canvas').style.opacity = (id === 'home-page') ? '1' : '0.1';
        }

        // --- PRODUCT LOGIC ---
        async function loadProducts() {
            const res = await fetch(`${API_BASE}/products`);
            const products = await res.json();
            document.getElementById('product-grid').innerHTML = products.map(p => `
                <div style="background:rgba(255,255,255,0.03); border:1px solid #222; padding:20px;">
                    <h3>${p.name.toUpperCase()}</h3>
                    <p style="color:var(--green); margin:10px 0;">₹${p.price}</p>
                    <button class="btn-prime">ADD TO CART</button>
                </div>
            `).join('');
        }

        async function loadAdminProducts() {
            const res = await fetch(`${API_BASE}/products`);
            const products = await res.json();
            document.getElementById('admin-product-list').innerHTML = products.map(p => `
                <div style="display:flex; justify-content:space-between; align-items:center; background:#111; padding:15px; border-bottom:1px solid #222;">
                    <span>${p.name} - ₹${p.price}</span>
                    <button class="btn-prime btn-delete" style="width:100px;" onclick="deleteProduct('${p._id}')">DELETE</button>
                </div>
            `).join('');
        }

        async function addProduct() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            await fetch(`${API_BASE}/admin/products`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, price })
            });
            showToast("ADDED");
            loadAdminProducts();
        }

        async function deleteProduct(id) {
            await fetch(`${API_BASE}/admin/products/${id}`, { method: 'DELETE' });
            showToast("DELETED");
            loadAdminProducts();
        }

        // --- AUTH ---
        function openAuth(m) {
            document.getElementById('auth-overlay').style.display = 'flex';
            document.getElementById('auth-title').innerText = m;
            document.getElementById('auth-fields').innerHTML = m === 'SIGNUP' ? 
                `<input id="a-name" placeholder="NAME"><input id="a-email" placeholder="EMAIL"><input type="password" id="a-pass" placeholder="PASS">` :
                `<input id="a-email" placeholder="EMAIL"><input type="password" id="a-pass" placeholder="PASS">`;
        }

        function toggleAuth() {
            const c = document.getElementById('auth-title').innerText;
            openAuth(c === 'LOGIN' ? 'SIGNUP' : 'LOGIN');
        }

        async function submitAuth() {
            const mode = document.getElementById('auth-title').innerText.toLowerCase();
            const email = document.getElementById('a-email').value;
            const pass = document.getElementById('a-pass').value;
            const res = await fetch(`${API_BASE}/${mode}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email, password: pass, fullName: document.getElementById('a-name')?.value })
            });
            const data = await res.json();
            if(res.ok) {
                loggedUser = data.user;
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('auth-trigger').innerText = loggedUser.name.toUpperCase();
                if(loggedUser.role === 'admin') document.getElementById('admin-link').style.display = 'block';
                showToast("LOGGED IN");
            } else { alert("Login Error"); }
        }

        function showToast(m) {
            const t = document.getElementById('toast'); t.innerText = m; t.style.display = "block";
            setTimeout(() => t.style.display = "none", 3000);
        }

        // --- CANVAS ANIMATION FOR GYM GIRL ---
        const canvas = document.getElementById("hero-canvas");
        const ctx = canvas.getContext("2d");
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        const images = [];
        for(let i=1; i<=50; i++) {
            const img = new Image();
            img.src = `frames/${i.toString().padStart(2, '0')}.jpg`;
            images.push(img);
        }
        let idx = 0;
        function anim() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            const currentImg = images[Math.floor(idx % 50)];
            if(currentImg?.complete) {
                const scale = Math.max(canvas.width / currentImg.width, canvas.height / currentImg.height);
                ctx.drawImage(currentImg, canvas.width/2 - (currentImg.width*scale)/2, canvas.height/2 - (currentImg.height*scale)/2, currentImg.width*scale, currentImg.height*scale);
            }
            idx += 0.15; requestAnimationFrame(anim);
        }
        images[0].onload = anim;

        async function checkStatus() {
            try { 
                const res = await fetch(`${API_BASE}/status`);
                if(res.ok) document.getElementById('status-dot').classList.add('online');
            } catch(e) {}
        }
        checkStatus();
    </script>
</body>
</html>
